version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/backend.Dockerfile
    container_name: family-backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
      - backend-audio:/app/audio
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:///./data/family.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - family-network

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend.Dockerfile
    container_name: family-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - family-network

  caddy:
    image: caddy:2-alpine
    container_name: family-caddy
    restart: always
    ports:
      - "9000:9000"
      - "9443:443"
      - "9443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend
      - frontend
    networks:
      - family-network

volumes:
  backend-data:
    driver: local
  backend-audio:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local

networks:
  family-network:
    driver: bridge
