; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:seeed_xiao_esp32c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.07/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino
board_build.mcu = esp32c6
board_build.partitions = partitions.csv
; Enable USB CDC on boot so Serial goes to USB (like Arduino IDE menu setting)
build_flags =
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	; ===== Audio + WS pipeline defaults (override as needed) =====
	-DCFG_SAMPLE_RATE=16000
	-DCFG_FRAME_SAMPLES=320
	-DCFG_I2S_BCLK=0
	-DCFG_I2S_WS=1
	-DCFG_I2S_DIN=2
	-DCFG_I2S_MIC_SEL=21
	; BOOT key (active-low on most ESP32-C6 devkits)
	-DCFG_BUTTON_PIN=9
	-DCFG_BUTTON_ACTIVE_LOW=1
	; Single LED fallback (set to your board LED pin)
	-DCFG_LED_PIN=15
	-DCFG_LED_ACTIVE_LOW=0
	; Optional RGB LED pins (set to -1 to disable RGB)
	-DCFG_RGB_R_PIN=-1
	-DCFG_RGB_G_PIN=-1
	-DCFG_RGB_B_PIN=-1
	-DCFG_RGB_ACTIVE_LOW=0
	; Optional VAD
	-DCFG_ENABLE_VAD=0
	-DCFG_VAD_THRESHOLD=120
	-DCFG_VAD_SILENCE_MS=2000
	; Debug logs
	-DCFG_LOG_DEBUG=0

; Serial monitor settings (adjust port if needed)
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
monitor_filters = direct
monitor_port = /dev/cu.usbmodem11101
upload_port = /dev/cu.usbmodem11101

lib_deps =
	links2004/WebSockets @ ^2.6.1
