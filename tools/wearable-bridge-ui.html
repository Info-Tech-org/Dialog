<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>眼镜模拟 — 实时字幕</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: sans-serif; background: #1a1a1a; color: #eee; min-height: 100vh; }
    .controls { padding: 12px; background: #333; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .controls input { padding: 6px 10px; width: 200px; }
    .controls button { padding: 8px 14px; cursor: pointer; }
    .glasses-view { padding: 40px 20px; text-align: center; min-height: 200px; }
    .glasses-view .caption { font-size: 1.4rem; line-height: 1.6; margin: 8px 0; }
    .glasses-view .harmful { color: #ff8a80; font-weight: bold; margin-top: 12px; }
    .glasses-view .status { color: #888; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="controls">
    <label>后端 WS 地址</label>
    <input type="text" id="baseUrl" value="ws://localhost:8000" placeholder="ws://localhost:8000" />
    <label>设备 ID</label>
    <input type="text" id="deviceId" value="web-extension" placeholder="web-extension" />
    <button id="connect">连接</button>
    <button id="disconnect" disabled>断开</button>
    <span id="connStatus" class="status"></span>
  </div>
  <div class="glasses-view">
    <div id="status" class="status">填写地址与设备 ID 后点击「连接」。</div>
    <div id="caption" class="caption"></div>
    <div id="harmful" class="harmful"></div>
  </div>
  <script>
    let ws = null;
    const statusEl = document.getElementById('status');
    const captionEl = document.getElementById('caption');
    const harmfulEl = document.getElementById('harmful');
    const connStatusEl = document.getElementById('connStatus');

    function setStatus(t) { statusEl.textContent = t; }
    function setCaption(t) { captionEl.textContent = t || ''; }
    function setHarmful(t) { harmfulEl.textContent = t || ''; harmfulEl.style.display = t ? 'block' : 'none'; }

    document.getElementById('connect').onclick = () => {
      const base = document.getElementById('baseUrl').value.trim().replace(/\/$/, '');
      const deviceId = document.getElementById('deviceId').value.trim() || 'web-extension';
      const url = `${base}/ws/realtime/subscribe?device_id=${encodeURIComponent(deviceId)}`;
      ws = new WebSocket(url);
      ws.onopen = () => {
        connStatusEl.textContent = '已连接';
        document.getElementById('connect').disabled = true;
        document.getElementById('disconnect').disabled = false;
        setStatus('等待字幕…');
      };
      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'status') setStatus(msg.message || '已连接');
          else if (msg.type === 'asr') setCaption(msg.text || '');
          else if (msg.type === 'harmful_alert') setHarmful('⚠ ' + (msg.text || '') + ' (严重度 ' + (msg.severity || '') + ')');
        } catch (_) {}
      };
      ws.onclose = () => {
        connStatusEl.textContent = '已断开';
        document.getElementById('connect').disabled = false;
        document.getElementById('disconnect').disabled = true;
        setStatus('已断开');
      };
      ws.onerror = () => setStatus('连接失败');
    };

    document.getElementById('disconnect').onclick = () => {
      if (ws) { ws.close(); ws = null; }
    };
  </script>
</body>
</html>
